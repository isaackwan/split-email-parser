name: CI

on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Node.js — test on every current LTS and the latest release
  # ---------------------------------------------------------------------------
  test-node:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test

  # ---------------------------------------------------------------------------
  # Bun — latest release
  # ---------------------------------------------------------------------------
  test-bun:
    name: Bun (latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  # ---------------------------------------------------------------------------
  # Deno — latest v2.x release
  #
  # Deno doesn't resolve bare npm specifiers (e.g. 'mailparser') via
  # node_modules the way Node/Bun do. deno.json provides an import map that
  # redirects them to explicit npm: specifiers; Node and Bun ignore deno.json.
  # ---------------------------------------------------------------------------
  test-deno:
    name: Deno (latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Run tests
        # --no-check - mailparser failed to import
        # --allow-read : fixture files under test/fixtures/
        # --allow-env  : process.env access in config.js (Deno checks statically)
        run: deno test --allow-read --allow-env --no-check
