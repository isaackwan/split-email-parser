name: CI

on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Node.js — test on every current LTS and the latest release
  # ---------------------------------------------------------------------------
  test-node:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test

  # ---------------------------------------------------------------------------
  # Bun — latest release
  # ---------------------------------------------------------------------------
  test-bun:
    name: Bun (latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
